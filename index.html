<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rezepte">
<link rel="manifest" href="manifest.json">
<title>Rezeptbibliothek</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #242440;
    --surface3: #2e2e55;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #f0f0f8;
    --text-secondary: rgba(240,240,248,0.6);
    --text-muted: rgba(240,240,248,0.35);
    --accent: #7c6af7;
    --accent-light: rgba(124,106,247,0.15);
    --accent-border: rgba(124,106,247,0.4);
    --green: #4caf82;
    --green-bg: rgba(76,175,130,0.12);
    --green-border: rgba(76,175,130,0.3);
    --yellow: #f0b429;
    --yellow-bg: rgba(240,180,41,0.12);
    --yellow-border: rgba(240,180,41,0.3);
    --red: #ef5350;
    --red-bg: rgba(239,83,80,0.12);
    --red-border: rgba(239,83,80,0.3);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 8px;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted);
    font-size: 11px; gap: 3px;
    transition: color 0.2s;
  }
  .nav-btn i { font-size: 22px; }
  .nav-btn.active { color: var(--accent); }

  /* PAGES */
  .page { display: none; padding: 0 0 80px; min-height: 100dvh; }
  .page.active { display: block; }

  /* HEADER */
  .page-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
  }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

  /* CARDS */
  .recipe-grid { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .recipe-card:active { background: var(--surface2); }
  .recipe-emoji { font-size: 32px; flex-shrink: 0; width: 48px; text-align: center; }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recipe-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; display: flex; gap: 8px; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 99px; font-size: 11px; font-weight: 500;
  }
  .badge-vegan { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-vegetarisch { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
  .badge-fleisch { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* FILTER BAR */
  .filter-bar {
    display: flex; gap: 8px; padding: 10px 12px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 14px; border-radius: 99px;
    border: 1px solid var(--border-strong);
    background: none; color: var(--text-secondary);
    font-size: 13px; cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-chip.active { background: var(--accent-light); border-color: var(--accent-border); color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--text-muted);
  }
  .empty-state i { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(72px + env(safe-area-inset-bottom)); right: 20px;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); border: none;
    color: white; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 20px rgba(124,106,247,0.4);
    z-index: 80; transition: transform 0.2s;
  }
  .fab:active { transform: scale(0.93); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92dvh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
  }
  .modal-handle {
    width: 36px; height: 4px; background: var(--border-strong);
    border-radius: 2px; margin: 12px auto 0;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 12px;
  }
  .modal-title { font-size: 18px; font-weight: 600; }
  .modal-close {
    background: none; border: none; color: var(--text-secondary);
    font-size: 22px; cursor: pointer; padding: 4px;
  }
  .modal-body { padding: 0 16px 20px; }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 15px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent-border);
  }
  .form-textarea { resize: none; height: 80px; line-height: 1.5; }
  .form-select option { background: var(--surface2); }

  /* TABS IN MODAL */
  .tab-bar {
    display: flex; background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px; margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1; padding: 8px; border-radius: 7px;
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 14px;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: white; }

  /* BUTTONS */
  .btn {
    width: 100%; padding: 13px;
    border-radius: var(--radius-sm);
    border: none; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border-strong); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }

  /* LOADING */
  .loading-bar {
    height: 2px; background: var(--accent);
    border-radius: 1px;
    animation: loading 1.5s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 0; margin-left: 0; }
    50% { width: 70%; margin-left: 15%; }
    100% { width: 0; margin-left: 100%; }
  }
  .status-msg {
    font-size: 13px; color: var(--text-secondary);
    text-align: center; padding: 8px 0;
  }
  .status-msg.error { color: var(--red); }
  .status-msg.success { color: var(--green); }

  /* DETAIL VIEW */
  .detail-hero {
    background: var(--surface); padding: 24px 16px 20px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .detail-emoji { font-size: 56px; }
  .detail-name { font-size: 22px; font-weight: 600; margin-top: 8px; }
  .detail-badges { display: flex; gap: 6px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
  .detail-body { padding: 16px; }
  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 13px; font-weight: 500; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 10px;
  }
  .detail-text { font-size: 15px; line-height: 1.7; color: var(--text-secondary); }
  .ingredient-list { list-style: none; }
  .ingredient-list li {
    padding: 8px 0; border-bottom: 1px solid var(--border);
    font-size: 15px; display: flex; align-items: center; gap: 8px;
  }
  .ingredient-list li:last-child { border-bottom: none; }
  .ingredient-list li::before { content: "·"; color: var(--accent); font-size: 18px; }
  .step-list { list-style: none; counter-reset: steps; }
  .step-list li {
    counter-increment: steps;
    display: flex; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 15px; line-height: 1.6; color: var(--text-secondary);
  }
  .step-list li:last-child { border-bottom: none; }
  .step-num {
    flex-shrink: 0; width: 24px; height: 24px;
    background: var(--accent-light); color: var(--accent);
    border-radius: 50%; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }
  .step-num::before { content: counter(steps); }
  .detail-actions { display: flex; gap: 10px; padding: 0 16px 16px; }
  .back-btn {
    background: none; border: none; color: var(--accent);
    font-size: 15px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    padding: 16px 16px 0;
  }

  /* WOCHENPLAN */
  .week-header { padding: 12px 16px 8px; }
  .week-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .week-grid { padding: 0 12px 20px; display: flex; flex-direction: column; gap: 10px; }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .day-name { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }
  .day-date { font-size: 12px; color: var(--text-muted); }
  .day-recipe {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
  }
  .day-recipe:active { background: var(--surface2); }
  .day-recipe-emoji { font-size: 24px; flex-shrink: 0; }
  .day-recipe-name { font-size: 15px; font-weight: 500; flex: 1; }
  .day-empty {
    padding: 12px 14px;
    color: var(--text-muted); font-size: 14px;
    font-style: italic;
  }
  .week-actions {
    display: flex; gap: 10px; padding: 0 12px 8px;
  }
  .week-actions .btn { flex: 1; }

  /* SHOPPING LIST */
  .shopping-category {
    padding: 6px 16px 4px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--text-muted);
  }
  .shopping-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .shopping-item:active { background: var(--surface2); }
  .shopping-item.checked { opacity: 0.4; }
  .shopping-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border-strong);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .shopping-item.checked .shopping-check {
    background: var(--green); border-color: var(--green);
    color: white;
  }
  .shopping-item-text { flex: 1; font-size: 15px; }
  .shopping-item.checked .shopping-item-text { text-decoration: line-through; }
  .shopping-item-from { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .shopping-empty { text-align:center; padding: 40px 24px; color: var(--text-muted); font-size:14px; }
  .shopping-progress {
    margin: 0 16px 4px;
    height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .shopping-progress-bar {
    height: 100%; background: var(--green); border-radius: 2px;
    transition: width 0.3s;
  }
  .shopping-stats {
    display: flex; justify-content: space-between;
    padding: 4px 16px 8px;
    font-size: 12px; color: var(--text-muted);
  }
  .shopping-add-row {
    display: flex; gap: 8px; padding: 8px 12px 4px;
  }
  .shopping-add-row .form-input { flex: 1; }
  .shopping-add-row button {
    background: var(--accent-light); border: 1px solid var(--accent-border);
    color: var(--accent); border-radius: var(--radius-sm);
    padding: 0 16px; cursor: pointer; font-size: 20px; font-weight: 300;
    display: flex; align-items: center;
  }

  .ingredient-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .ingredient-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid var(--accent-border);
    border-radius: 99px; padding: 3px 10px; font-size: 13px;
  }
  .ingredient-tag button {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-size: 16px; line-height: 1; padding: 0;
  }
  .ingredient-input-row { display: flex; gap: 8px; }
  .ingredient-input-row .form-input { flex: 1; }
  .add-ingredient-btn {
    background: var(--accent-light); border: 1px solid var(--accent-border);
    color: var(--accent); border-radius: var(--radius-sm);
    padding: 0 14px; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('library')" id="nav-library">
    <i class="ti ti-book-2" aria-hidden="true"></i>
    Bibliothek
  </button>
  <button class="nav-btn" onclick="showPage('planner')" id="nav-planner">
    <i class="ti ti-calendar-week" aria-hidden="true"></i>
    Wochenplan
  </button>
  <button class="nav-btn" onclick="showPage('shopping')" id="nav-shopping">
    <i class="ti ti-shopping-cart" aria-hidden="true"></i>
    Einkauf
  </button>
</nav>

<!-- LIBRARY PAGE -->
<div id="page-library" class="page active">
  <div class="page-header">
    <div class="page-title">Meine Rezepte</div>
    <div class="page-subtitle" id="recipe-count">0 Rezepte</div>
  </div>
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('alle', this)">Alle</button>
    <button class="filter-chip" onclick="setFilter('vegan', this)">🌱 Vegan</button>
    <button class="filter-chip" onclick="setFilter('vegetarisch', this)">🥗 Vegetarisch</button>
    <button class="filter-chip" onclick="setFilter('fleisch', this)">🥩 Fleisch</button>
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- PLANNER PAGE -->
<div id="page-planner" class="page">
  <div class="page-header">
    <div class="page-title">Wochenplan</div>
    <div class="page-subtitle">Abendessen für 7 Tage</div>
  </div>
  <div class="week-header">
    <div class="week-filter" id="week-filter">
      <button class="filter-chip active" onclick="setWeekFilter('alle', this)">Alle</button>
      <button class="filter-chip" onclick="setWeekFilter('vegan', this)">🌱 Vegan</button>
      <button class="filter-chip" onclick="setWeekFilter('vegetarisch', this)">🥗 Vegetarisch</button>
      <button class="filter-chip" onclick="setWeekFilter('fleisch', this)">🥩 Fleisch</button>
    </div>
    <div class="week-actions">
      <button class="btn btn-primary" onclick="generateWeekPlan()">
        <i class="ti ti-shuffle" aria-hidden="true"></i> Zufällig generieren
      </button>
      <button class="btn btn-secondary" onclick="clearWeekPlan()">
        <i class="ti ti-trash" aria-hidden="true"></i>
      </button>
    </div>
  </div>
  <div class="week-grid" id="week-grid"></div>
</div>

<!-- SHOPPING PAGE -->
<div id="page-shopping" class="page">
  <div class="page-header">
    <div class="page-title">Einkaufsliste</div>
    <div class="page-subtitle" id="shopping-subtitle">Aus dem aktuellen Wochenplan</div>
  </div>
  <div style="padding: 12px; display: flex; gap: 8px;">
    <button class="btn btn-primary" onclick="generateShoppingList()" style="flex:1">
      <i class="ti ti-refresh" aria-hidden="true"></i> Aus Wochenplan laden
    </button>
    <button class="btn btn-secondary" onclick="shareShoppingList()" style="flex:0 0 auto; width:auto; padding:13px 16px" title="Teilen">
      <i class="ti ti-share" aria-hidden="true"></i>
    </button>
  </div>
  <div id="shopping-list-content"></div>
</div>
<div id="page-detail" class="page">
  <button class="back-btn" onclick="goBack()">
    <i class="ti ti-arrow-left" aria-hidden="true"></i> Zurück
  </button>
  <div id="detail-content"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" aria-label="Rezept hinzufügen" id="fab">
  <i class="ti ti-plus" aria-hidden="true"></i>
</button>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Rezept hinzufügen</div>
      <button class="modal-close" onclick="closeModal('add-modal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="setTab('link', this)">🔗 Via Link</button>
        <button class="tab-btn" onclick="setTab('manual', this)">✍️ Manuell</button>
      </div>

      <!-- LINK TAB -->
      <div id="tab-link">
        <div class="form-group">
          <label class="form-label">Rezept-URL</label>
          <input class="form-input" id="recipe-url" type="url" placeholder="https://www.chefkoch.de/...">
        </div>
        <div id="import-status"></div>
        <button class="btn btn-primary" onclick="importFromUrl()">
          <i class="ti ti-wand" aria-hidden="true"></i> Mit KI importieren
        </button>
      </div>

      <!-- MANUAL TAB -->
      <div id="tab-manual" style="display:none">
        <div class="form-group">
          <label class="form-label">Rezeptname</label>
          <input class="form-input" id="m-name" type="text" placeholder="Spaghetti Carbonara">
        </div>
        <div class="form-group">
          <label class="form-label">Kategorie</label>
          <select class="form-select" id="m-category">
            <option value="fleisch">🥩 Fleisch / Fisch</option>
            <option value="vegetarisch">🥗 Vegetarisch</option>
            <option value="vegan">🌱 Vegan</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Beschreibung</label>
          <textarea class="form-textarea" id="m-desc" placeholder="Kurze Beschreibung des Rezepts..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Zutaten</label>
          <div class="ingredient-tags" id="ingredient-tags"></div>
          <div class="ingredient-input-row">
            <input class="form-input" id="ingredient-input" placeholder="z.B. 200g Pasta" onkeydown="if(event.key==='Enter'){addIngredient();event.preventDefault();}">
            <button class="add-ingredient-btn" onclick="addIngredient()">+</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Zubereitung (ein Schritt pro Zeile)</label>
          <textarea class="form-textarea" id="m-steps" placeholder="Wasser aufkochen..." style="height:100px"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Kochzeit</label>
          <input class="form-input" id="m-time" type="text" placeholder="30 Minuten">
        </div>
        <div class="form-group">
          <label class="form-label">Portionen</label>
          <input class="form-input" id="m-servings" type="text" placeholder="4">
        </div>
        <button class="btn btn-primary" onclick="saveManual()" style="margin-top:4px">
          <i class="ti ti-check" aria-hidden="true"></i> Rezept speichern
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const DAYS = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const EMOJIS = { vegan:'🥬', vegetarisch:'🥗', fleisch:'🥩' };
let recipes = JSON.parse(localStorage.getItem('recipes') || '[]');
let weekPlan = JSON.parse(localStorage.getItem('weekPlan') || '{}');
let currentFilter = 'alle';
let weekFilter = 'alle';
let currentIngredients = [];
let previousPage = 'library';

function save() {
  localStorage.setItem('recipes', JSON.stringify(recipes));
  localStorage.setItem('weekPlan', JSON.stringify(weekPlan));
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const nb = document.getElementById('nav-' + name);
  if(nb) nb.classList.add('active');
  document.getElementById('fab').style.display = (name === 'library') ? 'flex' : 'none';
  if(name === 'library') renderLibrary();
  if(name === 'planner') renderPlanner();
  if(name === 'shopping') renderShoppingList();
  previousPage = name;
}

function showDetail(id) {
  const r = recipes.find(x => x.id === id);
  if(!r) return;
  previousPage = document.querySelector('.page.active').id.replace('page-','');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('nav-library').classList.remove('active');
  document.getElementById('nav-planner').classList.remove('active');
  document.getElementById('fab').style.display = 'none';
  document.getElementById('page-detail').classList.add('active');
  renderDetail(r);
}

function goBack() { showPage(previousPage || 'library'); }

function renderDetail(r) {
  const badgeClass = { vegan:'badge-vegan', vegetarisch:'badge-vegetarisch', fleisch:'badge-fleisch' };
  const badgeLabel = { vegan:'🌱 Vegan', vegetarisch:'🥗 Vegetarisch', fleisch:'🥩 Fleisch' };
  const ingHtml = (r.ingredients||[]).length
    ? `<ul class="ingredient-list">${r.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>`
    : '<p class="detail-text">Keine Zutaten angegeben.</p>';
  const stepsHtml = (r.steps||[]).length
    ? `<ol class="step-list">${r.steps.map(s=>`<li><div class="step-num"></div><div>${s}</div></li>`).join('')}</ol>`
    : (r.description ? `<p class="detail-text">${r.description}</p>` : '<p class="detail-text">Keine Zubereitung angegeben.</p>');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div class="detail-emoji">${r.emoji||'🍽️'}</div>
      <div class="detail-name">${r.name}</div>
      <div class="detail-badges">
        <span class="badge ${badgeClass[r.category]||''}">${badgeLabel[r.category]||r.category}</span>
        ${r.time ? `<span class="badge" style="background:var(--surface2);color:var(--text-secondary)">⏱ ${r.time}</span>` : ''}
        ${r.servings ? `<span class="badge" style="background:var(--surface2);color:var(--text-secondary)">👥 ${r.servings} Portionen</span>` : ''}
      </div>
      ${r.source ? `<div style="margin-top:10px"><a href="${r.source}" style="color:var(--accent);font-size:13px">Originalrezept öffnen ↗</a></div>` : ''}
    </div>
    ${r.description ? `<div class="detail-body"><div class="detail-section"><div class="detail-section-title">Beschreibung</div><p class="detail-text">${r.description}</p></div></div>` : ''}
    <div class="detail-body" style="padding-top:${r.description?'0':'16px'}">
      <div class="detail-section">
        <div class="detail-section-title">Zutaten</div>
        ${ingHtml}
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Zubereitung</div>
        ${stepsHtml}
      </div>
    </div>
    <div class="detail-actions">
      <button class="btn btn-danger" onclick="deleteRecipe('${r.id}')">
        <i class="ti ti-trash" aria-hidden="true"></i> Löschen
      </button>
    </div>
  `;
}

function deleteRecipe(id) {
  if(!confirm('Rezept löschen?')) return;
  recipes = recipes.filter(r => r.id !== id);
  Object.keys(weekPlan).forEach(d => { if(weekPlan[d]===id) delete weekPlan[d]; });
  save(); goBack();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderLibrary();
}

function renderLibrary() {
  const filtered = currentFilter === 'alle' ? recipes : recipes.filter(r => r.category === currentFilter);
  document.getElementById('recipe-count').textContent = `${recipes.length} Rezept${recipes.length!==1?'e':''}`;
  const grid = document.getElementById('recipe-grid');
  if(filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><i class="ti ti-chef-hat"></i><p>${recipes.length===0?'Noch keine Rezepte. Füge dein erstes hinzu!':'Keine Rezepte in dieser Kategorie.'}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r => {
    const badgeClass = { vegan:'badge-vegan', vegetarisch:'badge-vegetarisch', fleisch:'badge-fleisch' };
    const badgeLabel = { vegan:'Vegan', vegetarisch:'Vegetarisch', fleisch:'Fleisch' };
    return `<div class="recipe-card" onclick="showDetail('${r.id}')">
      <div class="recipe-emoji">${r.emoji||'🍽️'}</div>
      <div class="recipe-info">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-meta">
          <span class="badge ${badgeClass[r.category]||''}">${badgeLabel[r.category]||r.category}</span>
          ${r.time ? `<span style="color:var(--text-muted)">⏱ ${r.time}</span>` : ''}
        </div>
      </div>
      <i class="ti ti-chevron-right" style="color:var(--text-muted)" aria-hidden="true"></i>
    </div>`;
  }).join('');
}

function setWeekFilter(f, btn) {
  weekFilter = f;
  document.querySelectorAll('#week-filter .filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
}

function generateWeekPlan() {
  const pool = weekFilter === 'alle' ? recipes : recipes.filter(r => r.category === weekFilter);
  if(pool.length === 0) { alert('Keine Rezepte für diese Kategorie vorhanden.'); return; }
  const today = new Date();
  weekPlan = {};
  const shuffled = [...pool].sort(() => Math.random()-0.5);
  DAYS.forEach((d, i) => {
    weekPlan[d] = shuffled[i % shuffled.length].id;
  });
  save(); renderPlanner();
}

function clearWeekPlan() {
  if(!confirm('Wochenplan leeren?')) return;
  weekPlan = {}; save(); renderPlanner();
}

function renderPlanner() {
  const today = new Date();
  const grid = document.getElementById('week-grid');
  grid.innerHTML = DAYS.map((day, i) => {
    const d = new Date(today);
    const dayOfWeek = today.getDay();
    const mondayOffset = (dayOfWeek === 0 ? -6 : 1) - dayOfWeek;
    d.setDate(today.getDate() + mondayOffset + i);
    const dateStr = d.toLocaleDateString('de-DE', {day:'numeric', month:'short'});
    const recipeId = weekPlan[day];
    const recipe = recipeId ? recipes.find(r => r.id === recipeId) : null;
    const bodyHtml = recipe
      ? `<div class="day-recipe" onclick="showDetail('${recipe.id}')">
          <div class="day-recipe-emoji">${recipe.emoji||'🍽️'}</div>
          <div class="day-recipe-name">${recipe.name}</div>
          <i class="ti ti-chevron-right" style="color:var(--text-muted)" aria-hidden="true"></i>
        </div>`
      : `<div class="day-empty">Noch kein Rezept geplant</div>`;
    return `<div class="day-card">
      <div class="day-header">
        <div class="day-name">${day}</div>
        <div class="day-date">${dateStr}</div>
      </div>
      ${bodyHtml}
    </div>`;
  }).join('');
}

/* ADD MODAL */
function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('recipe-url').value = '';
  document.getElementById('import-status').innerHTML = '';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  currentIngredients = [];
  renderIngredientTags();
}

function setTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-link').style.display = tab==='link' ? 'block' : 'none';
  document.getElementById('tab-manual').style.display = tab==='manual' ? 'block' : 'none';
}

function addIngredient() {
  const inp = document.getElementById('ingredient-input');
  const val = inp.value.trim();
  if(val) { currentIngredients.push(val); inp.value = ''; renderIngredientTags(); }
}

function removeIngredient(i) {
  currentIngredients.splice(i, 1);
  renderIngredientTags();
}

function renderIngredientTags() {
  document.getElementById('ingredient-tags').innerHTML = currentIngredients
    .map((ing, i) => `<span class="ingredient-tag">${ing}<button onclick="removeIngredient(${i})">×</button></span>`)
    .join('');
}

function saveManual() {
  const name = document.getElementById('m-name').value.trim();
  if(!name) { alert('Bitte einen Namen eingeben.'); return; }
  const cat = document.getElementById('m-category').value;
  const recipe = {
    id: Date.now().toString(),
    name,
    category: cat,
    description: document.getElementById('m-desc').value.trim(),
    ingredients: [...currentIngredients],
    steps: document.getElementById('m-steps').value.split('\n').map(s=>s.trim()).filter(Boolean),
    time: document.getElementById('m-time').value.trim(),
    servings: document.getElementById('m-servings').value.trim(),
    emoji: cat==='vegan' ? '🥬' : cat==='vegetarisch' ? '🥗' : '🥩',
    source: null
  };
  recipes.push(recipe);
  save();
  closeModal('add-modal');
  renderLibrary();
  ['m-name','m-desc','m-steps','m-time','m-servings'].forEach(id => document.getElementById(id).value='');
  currentIngredients = [];
}

async function importFromUrl() {
  const url = document.getElementById('recipe-url').value.trim();
  if(!url) { alert('Bitte eine URL eingeben.'); return; }
  const statusDiv = document.getElementById('import-status');
  statusDiv.innerHTML = '<div class="loading-bar"></div><div class="status-msg">Rezept wird geladen und analysiert...</div>';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Rufe die Rezeptseite unter dieser URL ab und extrahiere alle Rezeptinformationen: ${url}

Antworte NUR mit einem JSON-Objekt (kein Markdown, keine Erklärungen) in genau diesem Format:
{
  "name": "Rezeptname",
  "category": "vegan|vegetarisch|fleisch",
  "description": "Kurze Beschreibung",
  "ingredients": ["Zutat 1 mit Menge", "Zutat 2 mit Menge"],
  "steps": ["Schritt 1", "Schritt 2"],
  "time": "30 Minuten",
  "servings": "4",
  "emoji": "🍝"
}

Wichtig für category:
- "vegan": Keine tierischen Produkte
- "vegetarisch": Kein Fleisch/Fisch, aber Eier/Milch/Käse erlaubt
- "fleisch": Enthält Fleisch, Fisch oder Meeresfrüchte

Wähle ein passendes Emoji für das Gericht. Antworte ausschließlich mit dem JSON-Objekt.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.filter(b => b.type==='text').map(b=>b.text).join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if(!parsed.name || !parsed.category) throw new Error('Ungültiges Format');

    const recipe = {
      id: Date.now().toString(),
      name: parsed.name,
      category: parsed.category,
      description: parsed.description || '',
      ingredients: parsed.ingredients || [],
      steps: parsed.steps || [],
      time: parsed.time || '',
      servings: parsed.servings || '',
      emoji: parsed.emoji || (parsed.category==='vegan'?'🥬':parsed.category==='vegetarisch'?'🥗':'🥩'),
      source: url
    };

    recipes.push(recipe);
    save();
    statusDiv.innerHTML = '<div class="status-msg success">✓ Rezept erfolgreich importiert!</div>';
    setTimeout(() => {
      closeModal('add-modal');
      document.getElementById('recipe-url').value = '';
      renderLibrary();
    }, 1200);

  } catch(e) {
    console.error(e);
    statusDiv.innerHTML = '<div class="status-msg error">⚠ Fehler beim Importieren. Bitte URL prüfen oder manuell eingeben.</div>';
  }
}

/* SHOPPING LIST */
let shoppingItems = JSON.parse(localStorage.getItem('shoppingItems') || '[]');

function saveShop() {
  localStorage.setItem('shoppingItems', JSON.stringify(shoppingItems));
}

function generateShoppingList() {
  const planRecipeIds = Object.values(weekPlan);
  if(planRecipeIds.length === 0) {
    alert('Noch kein Wochenplan erstellt. Zuerst einen Plan generieren!');
    return;
  }
  const planRecipes = planRecipeIds.map(id => recipes.find(r => r.id === id)).filter(Boolean);
  // Merge all ingredients, track which recipe they come from
  const merged = {};
  planRecipes.forEach(recipe => {
    (recipe.ingredients || []).forEach(ing => {
      const key = ing.toLowerCase().trim();
      if(!merged[key]) merged[key] = { text: ing, recipes: [], checked: false };
      if(!merged[key].recipes.includes(recipe.name)) merged[key].recipes.push(recipe.name);
    });
  });
  // Preserve checked state for items that already exist
  const existing = {};
  shoppingItems.forEach(i => { existing[i.text.toLowerCase()] = i.checked; });
  shoppingItems = Object.values(merged).map(item => ({
    id: Math.random().toString(36).slice(2),
    text: item.text,
    recipes: item.recipes,
    checked: existing[item.text.toLowerCase()] || false,
    manual: false
  }));
  saveShop();
  renderShoppingList();
}

function toggleShoppingItem(id) {
  const item = shoppingItems.find(i => i.id === id);
  if(item) { item.checked = !item.checked; saveShop(); renderShoppingList(); }
}

function addManualShoppingItem() {
  const inp = document.getElementById('shopping-manual-input');
  const val = inp.value.trim();
  if(!val) return;
  shoppingItems.push({ id: Math.random().toString(36).slice(2), text: val, recipes: [], checked: false, manual: true });
  inp.value = '';
  saveShop();
  renderShoppingList();
}

function clearCheckedItems() {
  shoppingItems = shoppingItems.filter(i => !i.checked);
  saveShop();
  renderShoppingList();
}

function shareShoppingList() {
  const unchecked = shoppingItems.filter(i => !i.checked).map(i => `• ${i.text}`).join('\n');
  const checked = shoppingItems.filter(i => i.checked).map(i => `✓ ${i.text}`).join('\n');
  const text = `🛒 Einkaufsliste\n\n${unchecked}${checked ? '\n\n' + checked : ''}`;
  if(navigator.share) {
    navigator.share({ title: 'Einkaufsliste', text });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('In Zwischenablage kopiert!'));
  }
}

function renderShoppingList() {
  const container = document.getElementById('shopping-list-content');
  const planCount = Object.values(weekPlan).length;
  document.getElementById('shopping-subtitle').textContent =
    planCount > 0 ? `${planCount} Rezepte im Wochenplan` : 'Aus dem aktuellen Wochenplan';

  if(shoppingItems.length === 0) {
    container.innerHTML = `
      <div class="shopping-empty">
        <i class="ti ti-shopping-cart" style="font-size:40px;display:block;margin-bottom:10px"></i>
        Noch keine Zutaten. Lade den Wochenplan oder füge Artikel manuell hinzu.
      </div>
      <div class="shopping-add-row">
        <input class="form-input" id="shopping-manual-input" placeholder="Artikel hinzufügen..." onkeydown="if(event.key==='Enter')addManualShoppingItem()">
        <button onclick="addManualShoppingItem()">+</button>
      </div>`;
    return;
  }

  const total = shoppingItems.length;
  const done = shoppingItems.filter(i => i.checked).length;
  const pct = Math.round((done / total) * 100);

  const unchecked = shoppingItems.filter(i => !i.checked);
  const checked = shoppingItems.filter(i => i.checked);

  const renderItem = item => `
    <div class="shopping-item ${item.checked ? 'checked' : ''}" onclick="toggleShoppingItem('${item.id}')">
      <div class="shopping-check">
        ${item.checked ? '<i class="ti ti-check" style="font-size:13px"></i>' : ''}
      </div>
      <div style="flex:1;min-width:0">
        <div class="shopping-item-text">${item.text}</div>
        ${item.recipes.length ? `<div class="shopping-item-from">${item.recipes.join(', ')}</div>` : ''}
      </div>
    </div>`;

  container.innerHTML = `
    <div class="shopping-progress"><div class="shopping-progress-bar" style="width:${pct}%"></div></div>
    <div class="shopping-stats"><span>${done} von ${total} erledigt</span>${done > 0 ? `<span onclick="clearCheckedItems()" style="color:var(--accent);cursor:pointer">Erledigte entfernen</span>` : ''}</div>
    <div class="shopping-add-row">
      <input class="form-input" id="shopping-manual-input" placeholder="Artikel hinzufügen..." onkeydown="if(event.key==='Enter')addManualShoppingItem()">
      <button onclick="addManualShoppingItem()">+</button>
    </div>
    ${unchecked.length ? `<div class="shopping-category">Noch zu kaufen</div>${unchecked.map(renderItem).join('')}` : ''}
    ${checked.length ? `<div class="shopping-category" style="margin-top:8px">Erledigt</div>${checked.map(renderItem).join('')}` : ''}
  `;
}

// INIT
renderLibrary();
renderPlanner();
renderShoppingList();
</script>
</body>
